<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserindo Áudio e Vídeo</title>
</head>

<body>
    <h1>Inserindo musíca e vídeo</h1>
    <p>Para inserir uma musica Mp3 em sua pagina, o arquivo deve estar em uma pasta no site, no nosso caso temos uma
        pasta chamada média</p>

    <audio controls>
        <source src="midia/metalica_nothing.mp3" type="audio/mpeg">
        Seu navegador não suporta o elemento
    </audio>
    <br>
    <br>
    <br>

    <section>
        <p>Veja o Vídeo a seguir:</p>
        <video controls>
            <source src="midia/london.mp4" type="video/mp4">
            Seu navegador não suporta o elemento de vídeo
        </video>

    </section>

    <video controls>
        <source src="midia/pink-floyd.mp4" type="video/mp4">
        <track kind="subtitles" srclang="pt-bt" src="midia/legenda-ptbr.vtt" label="Português Brasil" default>
        
        <track kind="subtitles" srclang="en" src="midia/legenda-en.vtt" label="Inglês" default>

    </video>

    <mai>
        <p>Existe outra forma de inserir video sem ter o local de arquivo,usando o site <b>Youtube</b>.</p>

        <iframe width="560" height="315" src="https://www.youtube.com/embed/KU7BpDbaN7A?si=eaMimJ4LjAjiQdQV" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </mai>
</body>

</html>
