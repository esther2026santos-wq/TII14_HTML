<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com imagem</title>
</head>

<body>
    <h1> Trabalhando com imagem</h1>
    <p>O uso da tag <b>IMG</b> e os atributos <b> 
            src</b> e  <b>alt</b> . </p>
            
  <p> 
      <!-- Tag <img> insere imagemno fluxo de conteudo -->
     <img src="img/OIP.webp" alt="Maior do brasil">
       <!-- src: caminho para o arquivo de imagem alt: texto alternativo para acessbilidade e SEo. obs: recomendo evitar imagens sem alt  -->
</p>
<figure>
    <!-- <figure > tag que agrupa a imagem com a legenda semantica -->
    <img src="img/one_piece_anime_english_dub_egghead.avif" alt="Imagem do One Piece">
    <!--Legenda da figura  -->
    <figcaption>Imagem do melhor anime desse mundo 
</figcaption>
</figure>          
</body>
</html>
